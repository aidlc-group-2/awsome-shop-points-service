# Docker 容器环境配置
# 已对齐统一部署契约：端口 8081 + DB_* 变量 + 库名 awsome_shop_point

server:
  port: 8081

spring:
  # 数据源配置
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:awsome_shop_point}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 2
      max-active: 20
      max-wait: 60000

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: 0

  # Flyway 自动迁移（points 表结构由 Flyway 管理）
  flyway:
    enabled: true
    baseline-on-migrate: true
